<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/amazingMehsana.jpg" />

    <!-- Viewport – prevents iOS auto-zoom on inputs -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover" />

    <!-- Color scheme – tells iOS/Android this is a dark app; prevents flash of white -->
    <meta name="color-scheme" content="dark" />

    <!-- Theme color – browser chrome tint (Android Chrome address bar, iOS Safari) -->
    <meta name="theme-color" content="#FFAA00" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#FFAA00" />

    <!-- iOS PWA / Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Amazing Mahesana" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/amazingMehsana.jpg" />

    <!-- Disable iOS auto-detection of phone numbers / emails -->
    <meta name="format-detection" content="telephone=no, email=no" />

    <!-- SEO -->
    <meta name="description" content="Amazing Mahesana – Mahesana's Premium Digital Media Agency. Social media management, reels, podcast studio, influencer marketing & more." />
    <meta name="keywords" content="Amazing Mahesana, digital media agency, social media, reels, podcast, Mahesana, Gujarat" />

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Amazing Mahesana – Digital Media Agency</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
